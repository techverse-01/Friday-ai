name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev unzip zip openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Force Accept Android Licenses Natively
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # Dynamically accept all licenses via the Android SDK build tools path
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

    -  name: Build APK with Buildozer
       run: |
        rm -rf ~/.buildozer
        rm -rf .buildozer/
        export ANDROID_skip_update=False
        buildozer -v android debug
