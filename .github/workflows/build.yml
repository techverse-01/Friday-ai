name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev unzip zip openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK with Buildozer
      run: |
        # Completely clear out any old broken configurations
        rm -rf ~/.buildozer
        rm -rf .buildozer/
        
        # Create the target configuration paths early so the license verification hooks work
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Start a background loops that auto-accepts Android licenses the second Buildozer downloads them
        while true; do
          if [ -d "/home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" ]; then
            yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          elif [ -d "/home/runner/.buildozer/android/platform/android-sdk/tools/bin" ]; then
            yes | /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
          fi
          sleep 5
        done &
        LOOP_PID=$!

        # Run the compilation
        buildozer -v android debug

        # Kill the background license loop once the build completes
        kill $LOOP_PID || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
        
