name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev unzip zip
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Set up JDK 17 (Required for Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Pre-accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # Install sdkmanager and automatically accept licenses natively
        sudo apt-get install -y android-sdk
        yes | sudo sdkmanager --licenses || true

    - name: Build APK with Buildozer
      run: |
        buildozer android debug
        
