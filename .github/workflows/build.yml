name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev unzip zip openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK with System Android SDK
      run: |
        # Clear any corrupted buildozer local setups
        rm -rf ~/.buildozer
        rm -rf .buildozer/
        
        # Explicitly accept licenses on the built-in runner SDK
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Link Buildozer to use the pre-installed, pre-licensed runner SDK paths directly
        export BUILDOZER_ANDROID_SDK_DIR=$ANDROID_HOME
        export BUILDOZER_ANDROID_NDK_DIR=$ANDROID_HOME/ndk/25.2.9519653
        
        buildozer -v android debug
        
